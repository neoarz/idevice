name: Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build core library
        working-directory: ./idevice
        run: |
          # Build with heartbeat feature that includes tokio/time
          cargo build --features "heartbeat"
      - name: Check other features
        working-directory: ./idevice
        run: |
          # First check features that may depend on tokio time
          for feature in heartbeat tcp tunnel_tcp_stack xpc; do
            echo "Checking feature: $feature"
            cargo check --no-default-features --features "$feature"
          done
          
          # Then check other features
          for feature in afc amfi core_device_proxy debug_proxy dvt installation_proxy springboardservices misagent mobile_image_mounter location_simulation pair tss tunneld usbmuxd; do
            echo "Checking feature: $feature"
            cargo check --no-default-features --features "$feature"
          done 